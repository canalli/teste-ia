name: WAP DevSecOps Code Review

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  review-code:
    # 🔴 CRÍTICO: Diz para o GitHub rodar na sua máquina local (WSL)
    runs-on: self-hosted 

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

# 2. Isola apenas o que mudou (Funciona para Push e para Pull Request)
      - name: Get PR Diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🤖 Detectado: Evento de Pull Request. Extraindo diferença entre branches..."
            git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr.diff
          else
            echo "🚀 Detectado: Evento de Push direto. Extraindo alterações do último commit..."
            git diff HEAD~1 HEAD > pr.diff
          fi
          
          echo "📄 Conteúdo extraído para o arquivo pr.diff (Primeiras 10 linhas):"
          head -n 10 pr.diff

# 3. Garante que as dependências do Python estão prontas ignorando a trava da PEP 668
      - name: Set up Python Dependencies
        run: |
          pip3 install requests --break-system-packages --quiet

      # 4. Executa o script que conversa com o seu Ollama local
      - name: Run IA Auditor
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 /home/rafaelcanalli/actions_runner/_work/auditar_pr.py
